<div class="admin-login-container">
  <div class="login-card">
    <div class="login-header">
      <div class="admin-icon">🔐</div>
      <h1>Painel Administrativo</h1>
      <p *ngIf="loginStep === 'credentials'">Faça login para acessar o sistema</p>
      <p *ngIf="loginStep === 'twoFactor'">Digite o codigo enviado no Telegram para concluir o acesso</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">

      <ng-container *ngIf="loginStep === 'credentials'">
        <!-- Email -->
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="admin@casino.com"
            [class.error]="hasError('email')"
            autocomplete="email"
          />
          <span class="error-message" *ngIf="hasError('email')">
            {{ getErrorMessage('email') }}
          </span>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <label for="password">Senha</label>
          <div class="password-input">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              [class.error]="hasError('password')"
              autocomplete="current-password"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="togglePasswordVisibility()"
              tabindex="-1"
            >
              {{ showPassword ? '👁️' : '👁️‍🗨️' }}
            </button>
          </div>
          <span class="error-message" *ngIf="hasError('password')">
            {{ getErrorMessage('password') }}
          </span>
        </div>
      </ng-container>

      <ng-container *ngIf="loginStep === 'twoFactor'">
        <div class="form-group">
          <label for="twoFactorCode">Codigo de verificacao</label>
          <input
            id="twoFactorCode"
            type="text"
            formControlName="twoFactorCode"
            maxlength="6"
            placeholder="000000"
            [class.error]="hasError('twoFactorCode')"
            autocomplete="one-time-code"
          />
          <span class="error-message" *ngIf="hasError('twoFactorCode')">
            Digite um codigo numerico de 6 digitos.
          </span>
        </div>

        <button
          type="button"
          class="toggle-password"
          (click)="backToCredentials()"
          style="margin-bottom: 12px;"
        >
          ← Voltar e corrigir credenciais
        </button>
      </ng-container>

      <!-- Botão de login -->
      <button
        type="submit"
        class="login-btn"
        [disabled]="isSubmitting"
      >
        <span *ngIf="!isSubmitting && loginStep === 'credentials'">Enviar codigo</span>
        <span *ngIf="!isSubmitting && loginStep === 'twoFactor'">Validar codigo</span>
        <span *ngIf="isSubmitting" class="loading">
          <span class="spinner"></span>
          Processando...
        </span>
      </button>
    </form>

    <div class="login-footer">
      <p>
        <a routerLink="/">← Voltar ao site</a>
      </p>
    </div>
  </div>

  <div class="background-pattern"></div>
</div>
