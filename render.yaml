# Render Blueprint para Casino Online
# Este arquivo configura automaticamente todos os serviços necessários no Render.com

services:
  # Backend - Node.js API
  - type: web
    name: casino-backend
    runtime: node
    region: oregon # Região mais próxima com free tier
    plan: free
    buildCommand: cd casino-backend && npm ci
    startCommand: cd casino-backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false # Cole aqui a connection string do Neon (neon.tech)
      - key: JWT_SECRET
        generateValue: true # Gera um valor aleatório seguro
      - key: CORS_ORIGIN
        value: https://casino-frontend-6g0m.onrender.com,https://projeto-frog.onrender.com
      - key: FRONTEND_URL
        value: https://casino-frontend-6g0m.onrender.com
    autoDeploy: true
    rootDir: .

  # Frontend - Static Site (Angular)
  - type: web
    name: casino-frontend
    runtime: static
    buildCommand: cd casino-frontend && npm install --include=dev && npm run build:prod
    staticPublishPath: casino-frontend/dist/casino-frontend/browser
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /
        name: X-Frame-Options
        value: DENY
      - path: /
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_URL
        fromService:
          type: web
          name: casino-backend
          envVarKey: RENDER_EXTERNAL_URL
    autoDeploy: true
    rootDir: .

# Banco de dados hospedado no Neon (neon.tech) - persistente e gratuito
# Configure DATABASE_URL nas variáveis de ambiente do serviço casino-backend no Render Dashboard
